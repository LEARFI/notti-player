<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Notti Music Premium</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://www.youtube.com/iframe_api"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --accent: #1DB954;
            --bg: #000;
            --panel: #121212;
            --card: #181818;
            --text-dim: #b3b3b3;
        }

        body {
            background-color: var(--bg);
            color: white;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* --- Сайдбар для ПК --- */
        .sidebar {
            width: 260px;
            background: #000;
            padding: 20px;
            display: flex;
            flex-direction: column;
            border-right: 1px solid #222;
        }

        .sidebar h2 { color: var(--accent); margin-bottom: 30px; padding-left: 10px; }

        .nav-group { margin-bottom: 30px; }
        .nav-label { color: var(--text-dim); font-size: 11px; text-transform: uppercase; letter-spacing: 1px; padding: 10px; }
        
        .nav-item {
            padding: 12px 10px;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            gap: 15px;
            color: var(--text-dim);
            font-weight: 500;
        }
        .nav-item:hover, .nav-item.active { background: #282828; color: white; }

        /* --- Основной контент --- */
        .content {
            flex: 1;
            overflow-y: auto;
            padding: 25px;
            padding-bottom: 120px;
        }

        h3 { margin: 30px 0 15px; font-size: 22px; font-weight: 800; }

        /* Горизонтальные ленты */
        .scroll-row {
            display: flex;
            gap: 15px;
            overflow-x: auto;
            scrollbar-width: none;
            padding-bottom: 10px;
        }
        .scroll-row::-webkit-scrollbar { display: none; }

        /* Карточки исполнителей */
        .artist-circle {
            min-width: 140px;
            text-align: center;
            cursor: pointer;
        }
        .artist-circle img {
            width: 130px; height: 130px;
            border-radius: 50%; object-fit: cover;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
            margin-bottom: 10px;
            transition: 0.3s;
        }
        .artist-circle:hover img { transform: scale(1.05); }

        /* Карточки Миксов/Плейлистов */
        .mix-card {
            min-width: 160px;
            background: var(--card);
            padding: 15px;
            border-radius: 12px;
            cursor: pointer;
            transition: 0.3s;
        }
        .mix-card:hover { background: #282828; }
        .mix-card img { width: 100%; aspect-ratio: 1/1; border-radius: 8px; margin-bottom: 12px; }
        .mix-card .title { font-weight: bold; font-size: 14px; margin-bottom: 4px; }
        .mix-card .subtitle { color: var(--text-dim); font-size: 12px; }

        /* Плеер */
        .player-bar {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: #121212; border-top: 1px solid #222;
            padding: 15px 25px calc(15px + env(safe-area-inset-bottom));
            display: flex; align-items: center; justify-content: space-between;
            z-index: 1000;
        }

        @media (max-width: 768px) {
            .sidebar { display: none; }
            .content { padding: 15px; }
            .artist-circle { min-width: 100px; }
            .artist-circle img { width: 90px; height: 90px; }
        }

        #yt-player { position: absolute; visibility: hidden; }
    </style>
</head>
<body>

<div class="sidebar">
    <h2>Notti Premium</h2>
    
    <div class="nav-group">
        <div class="nav-item active" onclick="showPage('home')"><i class="fas fa-home"></i> Главная</div>
        <div class="nav-item" onclick="showPage('search')"><i class="fas fa-search"></i> Поиск</div>
        <div class="nav-item" onclick="showPage('fav')"><i class="fas fa-heart"></i> Избранное</div>
    </div>

    <div class="nav-label">Библиотека</div>
    <div class="nav-group">
        <div class="nav-item"><i class="fas fa-compact-disc"></i> Альбомы</div>
        <div class="nav-item"><i class="fas fa-users"></i> Исполнители</div>
        <div class="nav-item"><i class="fas fa-list"></i> Плейлисты</div>
    </div>

    <div class="nav-label">Утилиты</div>
    <div class="nav-group">
        <div class="nav-item" onclick="showPage('settings')"><i class="fas fa-cog"></i> Настройки</div>
    </div>
</div>

<div class="content">
    <div id="yt-player"></div>

    <div id="view-home">
        <h3>Твои миксы</h3>
        <div class="scroll-row">
            <div class="mix-card" onclick="playMix('Микс дня')">
                <img src="https://i1.sndcdn.com/artworks-000494452026-v99486-t500x500.jpg">
                <div class="title">Микс дня</div>
                <div class="subtitle">Платина, OG Buda...</div>
            </div>
            <div class="mix-card" onclick="playMix('Энергия')">
                <img src="https://i.pinimg.com/736x/80/e7/80/80e780650949d9709d7e39956637e6f8.jpg">
                <div class="title">Энергия</div>
                <div class="subtitle">Зарядись на максимум</div>
            </div>
            <div class="mix-card" onclick="playMix('Ночные дороги')">
                <img src="https://i.pinimg.com/736x/8a/80/7e/8a807ec1852033c706c9e0487002b115.jpg">
                <div class="title">Ночные дороги</div>
                <div class="subtitle">Атмосферный фон</div>
            </div>
        </div>

        <h3>Лучшие исполнители</h3>
        <div class="scroll-row" id="artist-row">
            </div>

        <h3>Плейлисты для тебя</h3>
        <div class="scroll-row">
            <div class="mix-card" onclick="search('Russian Rap')">
                <img src="https://i.pinimg.com/736x/6f/90/9e/6f909e702951b3f945398642337d121c.jpg">
                <div class="title">Хип-хоп</div>
            </div>
            <div class="mix-card" onclick="search('Phonk')">
                <img src="https://i.pinimg.com/736x/43/61/8b/43618b67f14b300305a468d601b63004.jpg">
                <div class="title">Фонк</div>
            </div>
            <div class="mix-card" onclick="search('Lofi')">
                <img src="https://i.pinimg.com/736x/8d/2a/3a/8d2a3a5f98888b150c2687c4f1981882.jpg">
                <div class="title">Lo-fi</div>
            </div>
        </div>
    </div>

    <div id="view-search" style="display:none;">
        <input type="text" id="s-input" placeholder="Треки, альбомы..." style="width:100%; background:#222; border:none; padding:15px; border-radius:10px; color:white;">
        <div id="s-results" style="margin-top:20px;"></div>
    </div>
</div>

<div class="player-bar" id="p-bar" style="display:none;">
    <div style="display:flex; align-items:center; width:30%;">
        <img id="p-img" src="" style="width:50px; height:50px; border-radius:5px; margin-right:12px;">
        <div style="overflow:hidden">
            <div id="p-name" style="font-weight:bold; white-space:nowrap; text-overflow:ellipsis; overflow:hidden;"></div>
            <div id="p-art" style="font-size:12px; color:var(--text-dim);"></div>
        </div>
    </div>
    <div style="display:flex; gap:25px; align-items:center;">
        <i class="fas fa-step-backward" onclick="prev()"></i>
        <i id="p-play" class="fas fa-play" style="font-size:24px;" onclick="toggle()"></i>
        <i class="fas fa-step-forward" onclick="next()"></i>
    </div>
    <div style="width:30%; text-align:right;">
        <i class="far fa-heart" onclick="tg.HapticFeedback.impactOccurred('medium')"></i>
    </div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    let player;
    let playlist = [];
    let currentIdx = -1;

    const artists = [
        { n: "Платина", i: "https://i.scdn.co/image/ab6761610000e5ebc18600d58852655a6d573512" },
        { n: "OG Buda", i: "https://i.scdn.co/image/ab6761610000e5eb9875f5436c9443586a345a98" },
        { n: "Friendly Thug 52", i: "https://i.scdn.co/image/ab6761610000e5eb559810775d799988a87c5305" },
        { n: "Mishlawi", i: "https://i.scdn.co/image/ab6761610000e5eb1d8677c77f0223e7456d2036" },
        { n: "Scally Milano", i: "https://i.scdn.co/image/ab6761610000e5eb1432f7413a1a44e54884279b" }
    ];

    function onYouTubeIframeAPIReady() {
        player = new YT.Player('yt-player', {
            events: {
                'onStateChange': (e) => {
                    document.getElementById('p-play').className = e.data === 1 ? 'fas fa-pause' : 'fas fa-play';
                    if(e.data === 0) next();
                }
            }
        });
    }

    function render() {
        document.getElementById('artist-row').innerHTML = artists.map(a => `
            <div class="artist-circle" onclick="search('${a.n}')">
                <img src="${a.i}">
                <div style="font-weight:500; font-size:14px;">${a.n}</div>
            </div>
        `).join('');
    }

    async function search(q) {
        showPage('search');
        document.getElementById('s-input').value = q;
        const res = await fetch(`/api/search?q=${encodeURIComponent(q + " Official Audio")}`);
        const data = await res.json();
        playlist = data;
        document.getElementById('s-results').innerHTML = data.map((t, i) => `
            <div style="display:flex; align-items:center; margin-bottom:15px;" onclick="play(${i})">
                <img src="${t.img}" style="width:50px; height:50px; border-radius:5px; margin-right:15px;">
                <div>
                    <div style="font-weight:bold;">${t.title}</div>
                    <div style="font-size:12px; color:var(--text-dim);">${t.artist}</div>
                </div>
            </div>
        `).join('');
    }

    function play(idx) {
        currentIdx = idx;
        const t = playlist[idx];
        document.getElementById('p-bar').style.display = 'flex';
        document.getElementById('p-img').src = t.img;
        document.getElementById('p-name').innerText = t.title;
        document.getElementById('p-art').innerText = t.artist;
        player.loadVideoById(t.id);
        player.playVideo();
        player.unMute();
    }

    function toggle() {
        player.getPlayerState() === 1 ? player.pauseVideo() : player.playVideo();
    }

    function next() { if(currentIdx < playlist.length - 1) play(currentIdx + 1); }
    function prev() { if(currentIdx > 0) play(currentIdx - 1); }

    function showPage(p) {
        document.getElementById('view-home').style.display = p === 'home' ? 'block' : 'none';
        document.getElementById('view-search').style.display = p === 'search' ? 'block' : 'none';
        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
    }

    document.getElementById('s-input').onkeypress = (e) => { if(e.key === 'Enter') search(e.target.value); };

    window.onload = render;
</script>
</body>
</html>
