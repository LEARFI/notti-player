<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Notti Music Fix</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://www.youtube.com/iframe_api"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --accent: #ff0055; --bg: #000; }
        body { background: var(--bg); color: white; font-family: -apple-system, sans-serif; margin: 0; padding: 20px; overflow-x: hidden; }
        .search-box { position: sticky; top: 10px; z-index: 100; margin-bottom: 20px; }
        #searchInput { width: 100%; padding: 15px; border-radius: 15px; border: 1px solid #333; background: #111; color: white; font-size: 16px; }
        
        .section-title { font-size: 18px; font-weight: bold; margin: 20px 0 10px; color: var(--accent); }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .card { background: #111; border-radius: 15px; overflow: hidden; border: 1px solid #222; text-align: center; padding-bottom: 10px; }
        .card img { width: 100%; aspect-ratio: 1/1; object-fit: cover; }
        .card-title { font-size: 14px; margin: 8px 5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        .mini-player { position: fixed; bottom: 20px; left: 15px; right: 15px; height: 70px; background: rgba(25,25,25,0.9); backdrop-filter: blur(15px); border-radius: 20px; display: none; align-items: center; padding: 0 15px; border: 1px solid #333; z-index: 1000; }
        .mini-player img { width: 45px; height: 45px; border-radius: 8px; margin-right: 12px; }
        .play-btn { width: 40px; height: 40px; border-radius: 50%; background: #fff; color: #000; display: flex; align-items: center; justify-content: center; margin-left: auto; }
        
        #yt-player { position: absolute; top: -1000px; visibility: hidden; }
        .status { text-align: center; opacity: 0.5; font-size: 12px; margin-top: 10px; }
    </style>
</head>
<body>

<div id="yt-player"></div>

<div class="search-box">
    <input type="text" id="searchInput" placeholder="Поиск (например: Travis Scott)...">
    <div id="debug-status" class="status">Готов к работе</div>
</div>

<div id="main-content">
    <div class="section-title">Популярное сейчас</div>
    <div class="grid" id="content-grid">
        </div>
</div>

<div class="mini-player" id="player">
    <img id="m-img" src="">
    <div style="flex:1; overflow:hidden;">
        <div id="m-title" style="font-weight:bold; font-size:14px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;"></div>
        <div id="m-artist" style="font-size:11px; opacity:0.6;"></div>
    </div>
    <div class="play-btn" onclick="togglePlay()"><i id="p-icon" class="fas fa-play"></i></div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    const YT_KEY = 'AIzaSyBYuWcCFDO-FPZXhK-AnIxw7nLGeGzwSHw';
    let ytPlayer, isPlaying = false;

    // Список "на всякий случай", если поиск не сработает
    const fallbackArtists = [
        { name: "The Weeknd", img: "https://www.theaudiodb.com/images/media/artist/thumb/vsqrxp1346513333.jpg" },
        { name: "Drake", img: "https://www.theaudiodb.com/images/media/artist/thumb/6t8p8y1428580228.jpg" },
        { name: "Dua Lipa", img: "https://www.theaudiodb.com/images/media/artist/thumb/7t8qx11522234057.jpg" },
        { name: "Miyagi", img: "https://www.theaudiodb.com/images/media/artist/thumb/miyagi-5c76c7c880826.jpg" }
    ];

    function onYouTubeIframeAPIReady() {
        ytPlayer = new YT.Player('yt-player', { height: '0', width: '0' });
    }

    async function search(name) {
        const grid = document.getElementById('content-grid');
        const status = document.getElementById('debug-status');
        status.innerText = "Ищем: " + name + "...";
        
        try {
            const res = await fetch(`https://musicbrainz.org/ws/2/release/?query=artist:${encodeURIComponent(name)}&fmt=json&limit=6`);
            const data = await res.json();
            
            if (data.releases && data.releases.length > 0) {
                grid.innerHTML = '';
                data.releases.forEach(rel => {
                    const cover = `https://coverartarchive.org/release/${rel.id}/front-250`;
                    grid.innerHTML += `
                        <div class="card" onclick="play('${name}', '${rel.title}', '${cover}')">
                            <img src="${cover}" onerror="this.src='https://via.placeholder.com/250/222/555?text=Music'">
                            <div class="card-title">${rel.title}</div>
                        </div>`;
                });
                status.innerText = "Найдено " + data.releases.length + " альбомов";
            } else {
                status.innerText = "Ничего не найдено. Попробуй другое имя.";
            }
        } catch (e) {
            status.innerText = "Ошибка поиска. Проверь интернет.";
            console.error(e);
        }
    }

    async function play(artist, title, cover) {
        document.getElementById('player').style.display = 'flex';
        document.getElementById('m-title').innerText = title;
        document.getElementById('m-artist').innerText = artist;
        document.getElementById('m-img').src = cover;

        const q = encodeURIComponent(`${artist} ${title} audio`);
        try {
            const res = await fetch(`https://www.googleapis.com/youtube/v3/search?part=snippet&q=${q}&key=${YT_KEY}&type=video&maxResults=1`);
            const data = await res.json();
            if (data.items && data.items[0]) {
                ytPlayer.loadVideoById(data.items[0].id.videoId);
                isPlaying = true;
                updateIcon();
                tg.HapticFeedback.impactOccurred('medium');
            }
        } catch (e) { alert("Ошибка YouTube API"); }
    }

    function togglePlay() {
        if (isPlaying) ytPlayer.pauseVideo(); else ytPlayer.playVideo();
        isPlaying = !isPlaying;
        updateIcon();
    }

    function updateIcon() { document.getElementById('p-icon').className = isPlaying ? 'fas fa-pause' : 'fas fa-play'; }

    function loadDefaults() {
        const grid = document.getElementById('content-grid');
        grid.innerHTML = fallbackArtists.map(a => `
            <div class="card" onclick="document.getElementById('searchInput').value='${a.name}'; search('${a.name}')">
                <img src="${a.img}">
                <div class="card-title">${a.name}</div>
            </div>
        `).join('');
    }

    document.getElementById('searchInput').onkeypress = (e) => {
        if(e.key === 'Enter') { search(e.target.value); e.target.blur(); }
    };

    window.onload = () => { tg.expand(); loadDefaults(); };
</script>
</body>
</html>
