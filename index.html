<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Notti Dynamic Glass</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://www.youtube.com/iframe_api"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --spotify-green: #1DB954;
            --glass: rgba(0, 0, 0, 0.4);
            --glass-border: rgba(255, 255, 255, 0.1);
            --dynamic-color: #333; /* Будет меняться через JS */
            --safe-bottom: env(safe-area-inset-bottom);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: #000;
            color: white;
            font-family: -apple-system, system-ui, sans-serif;
            margin: 0;
            overflow: hidden;
            display: flex;
            justify-content: center;
        }

        /* Живой фон */
        .bg-glow {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: radial-gradient(circle at 50% -20%, var(--dynamic-color), #000);
            transition: background 1.5s ease;
            z-index: -1;
        }

        .app-container {
            width: 100%;
            max-width: 500px;
            height: 100vh;
            position: relative;
            display: flex;
            flex-direction: column;
        }

        /* Стекло */
        .glass {
            background: var(--glass);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--glass-border);
        }

        /* Страницы */
        .content-area { flex-grow: 1; overflow-y: auto; padding-bottom: 180px; }
        .page { display: none; padding: 25px; animation: fadeIn 0.4s ease; }
        .active-page { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Визуализатор */
        .visualizer {
            display: flex; justify-content: center; align-items: flex-end;
            gap: 4px; height: 30px; margin-top: -35px; margin-bottom: 15px;
            opacity: 0; transition: opacity 0.5s;
        }
        .playing .visualizer { opacity: 1; }
        .bar { width: 4px; background: white; border-radius: 2px; animation: bounce 0.5s infinite alternate; }
        @keyframes bounce { from { height: 4px; } to { height: 24px; } }

        /* Обложка */
        .cover-container {
            width: 100%; display: flex; flex-direction: column; align-items: center;
            transition: transform 0.6s cubic-bezier(0.22, 1, 0.36, 1);
        }
        .playing .cover-container { transform: scale(1.05); }
        .f-img {
            width: 100%; aspect-ratio: 1/1; border-radius: 24px;
            object-fit: cover; box-shadow: 0 30px 60px rgba(0,0,0,0.6);
        }

        /* Навигация */
        nav {
            position: absolute; bottom: 0; width: 100%;
            display: flex; justify-content: space-around;
            padding: 15px 0 calc(15px + var(--safe-bottom));
            border-radius: 30px 30px 0 0;
            z-index: 1000;
        }
        nav a { color: rgba(255,255,255,0.4); text-decoration: none; text-align: center; transition: 0.3s; }
        nav a.active { color: white; }
        nav a i { font-size: 22px; display: block; margin-bottom: 4px; }

        /* Плееры */
        .mini-player {
            position: absolute; bottom: calc(85px + var(--safe-bottom));
            left: 15px; right: 15px; padding: 10px 15px;
            border-radius: 18px; display: flex; align-items: center; z-index: 999;
        }

        #full-player {
            position: fixed; top: 100%; left: 0; right: 0; height: 100%;
            background: #000; z-index: 2000;
            transition: transform 0.5s cubic-bezier(0.19, 1, 0.22, 1);
            padding: 60px 30px; display: flex; flex-direction: column; align-items: center;
        }
        #full-player.open { transform: translateY(-100%); }

        .btn-play-big {
            background: white; color: black; width: 75px; height: 75px;
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-size: 30px; transition: 0.2s;
        }
        .btn-play-big:active { transform: scale(0.85); }

        input[type="range"] { width: 100%; -webkit-appearance: none; background: rgba(255,255,255,0.1); height: 4px; border-radius: 2px; }
        input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 12px; height: 12px; background: white; border-radius: 50%; }

        #yt-player { display: none; }
    </style>
</head>
<body>

<div class="bg-glow" id="dynamic-bg"></div>

<div class="app-container">
    <div id="yt-player"></div>

    <div class="content-area">
        <div id="home" class="page active-page">
            <h2 style="font-size: 32px; font-weight: 800; margin-bottom: 25px;">Для тебя</h2>
            <div id="top-charts" style="display: flex; gap: 18px; overflow-x: auto; padding-bottom: 10px;"></div>
            <h3 style="margin-top: 40px; opacity: 0.6; font-size: 14px; text-transform: uppercase; letter-spacing: 1px;">Твоя медиатека</h3>
            <div id="playlists-container"></div>
        </div>

        <div id="search" class="page">
            <div class="glass" style="padding: 14px 20px; border-radius: 18px; display: flex; align-items: center;">
                <i class="fas fa-search" style="opacity: 0.5;"></i>
                <input type="text" id="search-input" placeholder="Треки или артисты" style="background:none; border:none; color:white; width:100%; margin-left:12px; font-size:16px; outline:none;">
            </div>
            <div id="search-results" style="margin-top: 25px;"></div>
        </div>
    </div>

    <div class="mini-player glass" id="mini-p" onclick="openFullPlayer()" style="display: none;">
        <img id="m-img" src="" style="width:48px; height:48px; border-radius:10px; margin-right:15px; object-fit: cover;">
        <div style="flex-grow:1; overflow:hidden;">
            <div id="m-title" style="font-size:14px; font-weight:bold; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;"></div>
            <div id="m-artist" style="font-size:12px; opacity:0.5;"></div>
        </div>
        <i id="m-play" class="fas fa-play" style="font-size:22px; margin-left:15px;" onclick="togglePlay(event)"></i>
    </div>

    <div id="full-player">
        <div style="width:100%; display:flex; justify-content:space-between; align-items:center; opacity:0.5;">
            <i class="fas fa-chevron-down" style="font-size: 22px;" onclick="closeFullPlayer()"></i>
            <span style="font-size:11px; font-weight:900; letter-spacing:3px;">NOTTI MUSIC</span>
            <i class="fas fa-ellipsis-h"></i>
        </div>

        <div class="cover-container" style="margin-top: 50px;">
            <img id="f-img" class="f-img" src="">
            <div class="visualizer">
                <div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div>
            </div>
        </div>

        <div style="width:100%; margin-top: 35px;">
            <div id="f-title" style="font-size:28px; font-weight:900; letter-spacing:-0.5px;"></div>
            <div id="f-artist" style="font-size:18px; opacity:0.5; margin-top:6px;"></div>
        </div>

        <div style="width:100%; margin-top: 35px;">
            <input type="range" id="progress-slider" value="0" step="1" oninput="seekTrack(this.value)">
            <div style="display:flex; justify-content:space-between; font-size:11px; margin-top:10px; opacity:0.5; font-variant-numeric: tabular-nums;">
                <span id="time-current">0:00</span>
                <span id="time-total">0:00</span>
            </div>
        </div>

        <div style="display:flex; align-items:center; gap:45px; margin-top:40px;">
            <i class="fas fa-step-backward" style="font-size:28px;" onclick="prevTrack()"></i>
            <div class="btn-play-big" onclick="togglePlay(event)">
                <i id="f-play-icon" class="fas fa-play"></i>
            </div>
            <i class="fas fa-step-forward" style="font-size:28px;" onclick="nextTrack()"></i>
        </div>

        <div style="width:100%; display:flex; justify-content:space-between; margin-top:70px;">
            <i id="like-btn" class="far fa-heart" style="font-size:28px;" onclick="toggleLike()"></i>
            <i class="fas fa-share-alt" style="font-size:26px;" onclick="shareTrack()"></i>
        </div>
    </div>

    <nav class="glass">
        <a href="javascript:void(0)" onclick="showPage('home', this)" class="active"><i class="fas fa-home"></i><span>Главная</span></a>
        <a href="javascript:void(0)" onclick="showPage('search', this)"><i class="fas fa-search"></i><span>Поиск</span></a>
    </nav>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();
    
    let player;
    let currentPlaylist = [];
    let currentIndex = -1;
    const colors = ['#504c4c', '#1e3a8a', '#1e40af', '#3730a3', '#5b21b6', '#6b21a8', '#86198f', '#9d174d', '#991b1b'];

    function onYouTubeIframeAPIReady() {
        player = new YT.Player('yt-player', {
            events: { 'onStateChange': (e) => {
                updateUI(e.data === 1);
                if(e.data === 0) nextTrack();
            }}
        });
    }

    function showPage(pageId, el) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
        document.getElementById(pageId).classList.add('active-page');
        document.querySelectorAll('nav a').forEach(a => a.classList.remove('active'));
        el.classList.add('active');
    }

    async function playTrack(id, title, artist, img, list = []) {
        if(list.length > 0) {
            currentPlaylist = list;
            currentIndex = currentPlaylist.findIndex(t => t.id === id);
        }
        
        document.getElementById('mini-p').style.display = 'flex';
        document.getElementById('m-img').src = img;
        document.getElementById('m-title').innerText = title;
        document.getElementById('m-artist').innerText = artist;

        document.getElementById('f-img').src = img.replace('default', 'hqdefault');
        document.getElementById('f-title').innerText = title;
        document.getElementById('f-artist').innerText = artist;

        // Смена динамического цвета
        const randomColor = colors[Math.floor(Math.random() * colors.length)];
        document.documentElement.style.setProperty('--dynamic-color', randomColor);

        player.loadVideoById(id);
        player.playVideo();
        tg.HapticFeedback.impactOccurred('light');
    }

    function updateUI(isPlaying) {
        const icon = isPlaying ? 'fa-pause' : 'fa-play';
        document.getElementById('m-play').className = 'fas ' + icon;
        document.getElementById('f-play-icon').className = 'fas ' + icon;
        
        const fp = document.getElementById('full-player');
        isPlaying ? fp.classList.add('playing') : fp.classList.remove('playing');
        
        if(isPlaying) startTimer();
    }

    function startTimer() {
        setInterval(() => {
            if(player && player.getCurrentTime) {
                const cur = player.getCurrentTime();
                const dur = player.getDuration();
                const slider = document.getElementById('progress-slider');
                if(dur > 0) {
                    slider.max = dur;
                    slider.value = cur;
                    document.getElementById('time-current').innerText = formatTime(cur);
                    document.getElementById('time-total').innerText = formatTime(dur);
                }
            }
        }, 1000);
    }

    function formatTime(s) {
        const m = Math.floor(s/60);
        const sec = Math.floor(s%60);
        return m + ":" + (sec < 10 ? '0'+sec : sec);
    }

    function togglePlay(e) {
        e.stopPropagation();
        player.getPlayerState() === 1 ? player.pauseVideo() : player.playVideo();
    }

    function nextTrack() {
        if(currentIndex < currentPlaylist.length - 1) {
            currentIndex++;
            const t = currentPlaylist[currentIndex];
            playTrack(t.id, t.title, t.artist, t.img);
        }
    }

    function prevTrack() {
        if(currentIndex > 0) {
            currentIndex--;
            const t = currentPlaylist[currentIndex];
            playTrack(t.id, t.title, t.artist, t.img);
        }
    }

    function seekTrack(v) { player.seekTo(v); }
    function openFullPlayer() { document.getElementById('full-player').classList.add('open'); }
    function closeFullPlayer() { document.getElementById('full-player').classList.remove('open'); }

    // Поиск
    document.getElementById('search-input').onkeypress = async function(e) {
        if(e.key === 'Enter') {
            const res = await fetch(`/api/search?q=${encodeURIComponent(this.value)}`);
            const tracks = await res.json();
            const cont = document.getElementById('search-results');
            cont.innerHTML = tracks.map(t => `
                <div class="glass" style="display:flex; align-items:center; margin-bottom:12px; padding:12px; border-radius:15px;" 
                     onclick="playTrack('${t.id}','${t.title}','${t.artist}','${t.img}', ${JSON.stringify(tracks).replace(/"/g, '&quot;')})">
                    <img src="${t.img}" style="width:50px; border-radius:10px; margin-right:15px;">
                    <div style="flex-grow:1; overflow:hidden;">
                        <div style="font-size:15px; font-weight:bold; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">${t.title}</div>
                        <div style="font-size:12px; opacity:0.5;">${t.artist}</div>
                    </div>
                </div>
            `).join('');
        }
    }

    async function loadCharts() {
        const res = await fetch('/api/charts');
        const data = await res.json();
        document.getElementById('top-charts').innerHTML = data.map(t => `
            <div onclick="playTrack('${t.id}','${t.title}','${t.artist}','${t.img}', ${JSON.stringify(data).replace(/"/g, '&quot;')})" 
                 style="min-width:150px; text-align:center;">
                <img src="${t.img}" style="width:150px; height:150px; border-radius:20px; box-shadow:0 15px 30px rgba(0,0,0,0.4);">
                <div style="font-size:13px; font-weight:bold; margin-top:10px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">${t.title}</div>
            </div>
        `).join('');
    }

    window.onload = () => { loadCharts(); };
</script>
</body>
</html>
