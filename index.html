<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Notti Music Fixed</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://www.youtube.com/iframe_api"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --accent: #1DB954;
            --bg: #000;
            --panel: #121212;
        }

        body, html {
            background: var(--bg); color: white; margin: 0; padding: 0;
            height: 100%; width: 100%; overflow: hidden; font-family: sans-serif;
        }

        .app-container { display: flex; flex-direction: column; height: 100vh; }

        /* Секции контента */
        .page { 
            display: none; flex: 1; overflow-y: auto; 
            padding: 20px 20px 150px; -webkit-overflow-scrolling: touch; 
        }
        .page.active { display: block; }

        /* Поиск */
        .search-wrapper { padding: 15px 20px; background: #000; }
        .search-input { 
            background: #1a1a1a; border: none; border-radius: 10px; padding: 12px; 
            width: 100%; color: white; outline: none; font-size: 16px;
        }

        /* Карточки */
        .artist-row { display: flex; overflow-x: auto; gap: 15px; margin-bottom: 25px; padding-bottom: 10px; }
        .artist-card { min-width: 100px; text-align: center; cursor: pointer; }
        .artist-card img { width: 90px; height: 90px; border-radius: 50%; object-fit: cover; margin-bottom: 8px; border: 2px solid #222; }

        .track-card { 
            display: flex; align-items: center; padding: 10px; background: var(--panel); 
            border-radius: 12px; margin-bottom: 10px; cursor: pointer;
        }
        .track-card img { width: 50px; height: 50px; border-radius: 6px; margin-right: 15px; }

        /* Мини-плеер */
        .player-mini { 
            position: fixed; bottom: 85px; left: 10px; right: 10px; 
            background: var(--accent); color: black; border-radius: 12px; 
            padding: 10px 15px; display: none; align-items: center; z-index: 1000;
        }

        /* Навигация */
        nav { 
            position: fixed; bottom: 0; left: 0; right: 0; height: 75px; 
            background: #000; border-top: 1px solid #1a1a1a; display: flex; 
            padding-bottom: env(safe-area-inset-bottom);
        }
        nav div { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 10px; opacity: 0.5; cursor: pointer; }
        nav div.active { opacity: 1; color: var(--accent); }
        nav i { font-size: 22px; margin-bottom: 4px; }

        #yt-player { position: absolute; top: -9999px; }
    </style>
</head>
<body>

<div id="yt-player"></div>

<div class="app-container">
    <div class="search-wrapper">
        <input type="text" id="searchInput" class="search-input" placeholder="Треки, альбомы, артисты...">
    </div>

    <div id="home" class="page active">
        <h2>Популярные артисты</h2>
        <div class="artist-row" id="artistList"></div>

        <h2>Твои миксы</h2>
        <div id="mixList"></div>
    </div>

    <div id="favorites" class="page">
        <h2>Моя медиатека</h2>
        <div id="favTracks">
            <p style="opacity:0.4; text-align:center; margin-top:50px;">Здесь будут ваши любимые треки</p>
        </div>
    </div>

    <div id="settings" class="page">
        <h2>Настройки</h2>
        <div style="background:var(--panel); padding:20px; border-radius:15px;">
            <p>Качество: <b>Высокое (320kbps)</b></p>
            <p>Источник: <b>Notti Music Cloud</b></p>
            <hr style="opacity:0.1">
            <button onclick="clearAll()" style="background:#ff3b30; border:none; color:white; padding:10px; width:100%; border-radius:8px;">Очистить всё</button>
        </div>
    </div>

    <div class="player-mini" id="miniPlayer">
        <img id="mImg" src="">
        <div style="flex:1; overflow:hidden; font-weight:bold; white-space:nowrap; text-overflow:ellipsis;" id="mTitle"></div>
        <i id="mPlayBtn" class="fas fa-play" style="font-size:20px; padding:5px 10px;" onclick="togglePlay()"></i>
    </div>

    <nav>
        <div class="active" onclick="switchPage('home', this)"><i class="fas fa-home"></i>Главная</div>
        <div onclick="switchPage('favorites', this)"><i class="fas fa-heart"></i>Избранное</div>
        <div onclick="switchPage('settings', this)"><i class="fas fa-cog"></i>Опции</div>
    </nav>
</div>

<script>
    const tg = window.Telegram.WebApp;
    let player, playlist = [], curIdx = -1;
    let favorites = JSON.parse(localStorage.getItem('notti_favs') || '[]');

    const artists = [
        { name: "Платина", img: "https://i.scdn.co/image/ab6761610000e5ebc18600d58852655a6d573512" },
        { name: "OG Buda", img: "https://i.scdn.co/image/ab6761610000e5eb9875f5436c9443586a345a98" },
        { name: "Friendly Thug", img: "https://i.scdn.co/image/ab6761610000e5eb559810775d799988a87c5305" }
    ];

    function onYouTubeIframeAPIReady() {
        player = new YT.Player('yt-player', {
            events: {
                'onStateChange': (e) => {
                    document.getElementById('mPlayBtn').className = e.data === 1 ? 'fas fa-pause' : 'fas fa-play';
                }
            }
        });
    }

    function renderHome() {
        document.getElementById('artistList').innerHTML = artists.map(a => `
            <div class="artist-card" onclick="startSearch('${a.name}')">
                <img src="${a.img}">
                <div>${a.name}</div>
            </div>
        `).join('');
    }

    async function startSearch(val) {
        switchPage('home', document.querySelector('nav div')); // Возвращаем на главную при поиске
        const res = await fetch(`/api/search?q=${encodeURIComponent(val + " Official Audio")}`);
        const data = await res.json();
        playlist = data;
        
        document.getElementById('mixList').innerHTML = data.map((t, i) => `
            <div class="track-card" onclick="play(${i})">
                <img src="${t.img}">
                <div style="flex:1; overflow:hidden;">
                    <div style="font-weight:bold; white-space:nowrap; text-overflow:ellipsis; overflow:hidden;">${t.title}</div>
                    <div style="font-size:12px; opacity:0.5;">${t.artist}</div>
                </div>
                <i class="far fa-heart" onclick="event.stopPropagation(); addFav(${i})"></i>
            </div>
        `).join('');
    }

    function play(idx) {
        curIdx = idx;
        const t = playlist[curIdx];
        document.getElementById('miniPlayer').style.display = 'flex';
        document.getElementById('mImg').src = t.img;
        document.getElementById('mTitle').innerText = t.title;
        
        player.loadVideoById(t.id);
        player.playVideo();
        player.unMute();
    }

    function togglePlay() {
        if(player.getPlayerState() === 1) player.pauseVideo();
        else player.playVideo();
    }

    function switchPage(pageId, el) {
        // Скрываем все страницы
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        // Показываем нужную
        document.getElementById(pageId).classList.add('active');
        // Обновляем меню
        document.querySelectorAll('nav div').forEach(d => d.classList.remove('active'));
        el.classList.add('active');
        
        if(pageId === 'favorites') renderFavs();
        tg.HapticFeedback.impactOccurred('light');
    }

    function addFav(idx) {
        const t = playlist[idx];
        if(!favorites.some(f => f.id === t.id)) {
            favorites.push(t);
            localStorage.setItem('notti_favs', JSON.stringify(favorites));
            tg.showAlert("Добавлено в избранное!");
        }
    }

    function renderFavs() {
        const cont = document.getElementById('favTracks');
        if(favorites.length === 0) {
            cont.innerHTML = '<p style="opacity:0.4; text-align:center; margin-top:50px;">Тут пока пусто</p>';
            return;
        }
        cont.innerHTML = favorites.map((t, i) => `
            <div class="track-card" onclick="playlist=favorites; play(${i})">
                <img src="${t.img}">
                <div><b>${t.title}</b><div style="font-size:12px; opacity:0.5;">${t.artist}</div></div>
            </div>
        `).join('');
    }

    function clearAll() {
        localStorage.clear();
        location.reload();
    }

    document.getElementById('searchInput').onkeypress = (e) => {
        if(e.key === 'Enter') startSearch(e.target.value);
    };

    window.onload = renderHome;
</script>
</body>
</html>
