<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Notti Music Fix</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://www.youtube.com/iframe_api"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root { --accent: #1DB954; --bg: #000; }
        body, html { background: var(--bg); color: white; margin: 0; padding: 0; height: 100%; overflow: hidden; font-family: -apple-system, sans-serif; }

        /* Фикс фото артистов */
        .artist-img { width: 90px; height: 90px; border-radius: 50%; object-fit: cover; background: #222; margin-bottom: 8px; }
        
        .page { display: none; padding: 20px; height: 100vh; overflow-y: auto; box-sizing: border-box; }
        .page.active { display: block; }

        /* Плеер (как на скриншоте) */
        .full-player { position: fixed; inset: 0; background: #000; z-index: 9999; display: none; flex-direction: column; padding: 40px 30px; }
        .full-player.active { display: flex; }
        
        .cover-art { width: 100%; aspect-ratio: 1/1; border-radius: 20px; object-fit: cover; margin: 40px 0; box-shadow: 0 10px 50px rgba(0,0,0,0.8); }

        /* Скрытый контейнер YouTube (обязателен для звука) */
        #yt-hold { position: absolute; top: -1000px; width: 200px; height: 200px; }

        nav { position: fixed; bottom: 0; width: 100%; height: 75px; background: #000; display: flex; border-top: 1px solid #111; }
        nav div { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; opacity: 0.5; font-size: 12px; }
        nav div.active { opacity: 1; color: var(--accent); }
        
        .track-card { display: flex; align-items: center; margin-bottom: 15px; background: #111; padding: 10px; border-radius: 12px; }
        .track-card img { width: 50px; height: 50px; border-radius: 8px; margin-right: 15px; }
    </style>
</head>
<body>

<div id="yt-hold"><div id="player"></div></div>

<div id="home" class="page active">
    <h2>Артисты</h2>
    <div style="display: flex; gap: 20px; overflow-x: auto; padding-bottom: 20px;" id="artist-list"></div>
    
    <h2>Поиск</h2>
    <input type="text" id="searchInput" placeholder="Название трека..." style="width:100%; padding:15px; border-radius:12px; border:none; background:#1a1a1a; color:white; outline:none;">
    <div id="searchResults" style="margin-top:20px;"></div>
</div>

<div class="full-player" id="fullPlayer">
    <div onclick="toggleFull(false)"><i class="fas fa-chevron-down" style="font-size: 24px;"></i></div>
    <img id="fCover" class="cover-art" src="">
    <h1 id="fTitle" style="margin:0; font-size:28px;"></h1>
    <p id="fArtist" style="opacity:0.5; font-size:18px; margin-top:10px;"></p>
    
    <div style="display:flex; align-items:center; justify-content:center; gap:40px; margin-top:50px;">
        <i class="fas fa-step-backward" style="font-size:30px;"></i>
        <div onclick="togglePlay()" style="width:80px; height:80px; background:white; color:black; border-radius:50%; display:flex; align-items:center; justify-content:center;">
            <i id="playIcon" class="fas fa-play" style="font-size:30px;"></i>
        </div>
        <i class="fas fa-step-forward" style="font-size:30px;"></i>
    </div>
</div>

<nav>
    <div class="active" onclick="switchTab('home', this)"><i class="fas fa-home"></i><br>Главная</div>
    <div onclick="switchTab('settings', this)"><i class="fas fa-cog"></i><br>Настройки</div>
</nav>

<script>
    const tg = window.Telegram.WebApp;
    let ytPlayer;

    // Ссылки на видео артистов для получения фото
    const artists = [
        { name: "Платина", vid: "S_u-P_0E8zM" }, 
        { name: "OG Buda", vid: "RzI97v_hQRE" },
        { name: "FRIENDLY THUG", vid: "Xp3u8uH6hIs" }
    ];

    function onYouTubeIframeAPIReady() {
        ytPlayer = new YT.Player('player', {
            height: '200', width: '200',
            playerVars: { 'autoplay': 1, 'playsinline': 1 },
            events: {
                'onStateChange': (e) => {
                    document.getElementById('playIcon').className = e.data === 1 ? 'fas fa-pause' : 'fas fa-play';
                }
            }
        });
    }

    function renderArtists() {
        const container = document.getElementById('artist-list');
        container.innerHTML = artists.map(a => `
            <div onclick="startSearch('${a.name}')" style="text-align:center; min-width:90px;">
                <img class="artist-img" src="https://i.ytimg.com/vi/${a.vid}/hqdefault.jpg">
                <div style="font-size:12px;">${a.name}</div>
            </div>
        `).join('');
    }

    async function startSearch(q) {
        // Здесь имитация поиска (в реальном приложении тут fetch к вашему API)
        const mockData = [
            { id: "S_u-P_0E8zM", title: "Хенни", artist: "Платина" },
            { id: "RzI97v_hQRE", title: "Легенда", artist: "OG Buda" }
        ];
        
        document.getElementById('searchResults').innerHTML = mockData.map(t => `
            <div class="track-card" onclick="playTrack('${t.id}', '${t.title}', '${t.artist}')">
                <img src="https://i.ytimg.com/vi/${t.id}/hqdefault.jpg">
                <div>
                    <b>${t.title}</b><br>
                    <span style="opacity:0.5; font-size:12px;">${t.artist}</span>
                </div>
            </div>
        `).join('');
    }

    function playTrack(id, title, artist) {
        document.getElementById('fCover').src = `https://i.ytimg.com/vi/${id}/hqdefault.jpg`;
        document.getElementById('fTitle').innerText = title;
        document.getElementById('fArtist').innerText = artist;
        document.getElementById('fullPlayer').classList.add('active');
        
        ytPlayer.loadVideoById(id);
        ytPlayer.playVideo();
        ytPlayer.unMute(); // Принудительно включаем звук
        tg.HapticFeedback.impactOccurred('medium');
    }

    function togglePlay() {
        if(ytPlayer.getPlayerState() === 1) ytPlayer.pauseVideo();
        else ytPlayer.playVideo();
    }

    function toggleFull(show) {
        document.getElementById('fullPlayer').classList.toggle('active', show);
    }

    function switchTab(id, el) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.querySelectorAll('nav div').forEach(d => d.classList.remove('active'));
        el.classList.add('active');
    }

    document.getElementById('searchInput').onkeypress = (e) => {
        if(e.key === 'Enter') startSearch(e.target.value);
    };

    window.onload = () => {
        renderArtists();
        tg.expand();
    };
</script>
</body>
</html>
