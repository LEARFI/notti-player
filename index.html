<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Notti Music Search Fixed</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://w.soundcloud.com/player/api.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root { --accent: #ff5500; --bg: #000; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body, html { background: var(--bg); color: white; margin: 0; padding: 0; height: 100vh; overflow: hidden; font-family: -apple-system, sans-serif; }
        
        .app { display: flex; flex-direction: column; height: 100vh; padding: 20px; }
        .search-box { margin-bottom: 20px; position: sticky; top: 0; z-index: 10; background: var(--bg); }
        #scInput { width: 100%; padding: 18px; border-radius: 15px; border: 2px solid #222; background: #111; color: #fff; font-size: 16px; }
        #scInput:focus { border-color: var(--accent); }

        #list { flex: 1; overflow-y: auto; padding-bottom: 100px; }
        .track-item { display: flex; align-items: center; padding: 12px; background: #0c0c0c; border-radius: 14px; margin-bottom: 10px; border: 1px solid #1a1a1a; animation: fadeIn 0.3s ease; }
        .track-item img { width: 50px; height: 50px; border-radius: 8px; margin-right: 15px; background: #222; object-fit: cover; }
        .track-info { flex: 1; overflow: hidden; }
        .t-name { font-weight: bold; white-space: nowrap; text-overflow: ellipsis; overflow: hidden; font-size: 14px; }
        .t-artist { opacity: 0.5; font-size: 11px; margin-top: 3px; }

        /* Плеер */
        .full-player { position: fixed; inset: 0; background: #000; z-index: 9999; display: none; flex-direction: column; padding: 40px 30px; }
        .full-player.active { display: flex; }
        .fp-cover img { width: 100%; aspect-ratio: 1/1; border-radius: 20px; object-fit: cover; margin: 30px 0; box-shadow: 0 10px 40px rgba(255,85,0,0.2); }
        
        .prog-bg { width: 100%; height: 4px; background: #222; border-radius: 2px; margin: 30px 0; }
        #prog-fill { height: 100%; background: var(--accent); width: 0%; transition: 0.2s; }
        
        .controls { display: flex; align-items: center; justify-content: space-around; }
        .play-btn { width: 75px; height: 75px; background: #fff; color: #000; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 30px; }

        /* СКРЫТЫЙ ПОИСКОВЫЙ ФРЕЙМ */
        #sc-frame { position: absolute; top: -2000px; left: -2000px; width: 1px; height: 1px; }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<iframe id="sc-frame" src="https://w.soundcloud.com/player/?url=https://api.soundcloud.com/playlists/123456"></iframe>

<div class="app">
    <h1 style="color: var(--accent); font-size: 32px; letter-spacing: -1px; margin-bottom: 10px;">Notti</h1>
    <div class="search-box">
        <input type="text" id="scInput" placeholder="Введите название трека...">
    </div>
    <div id="loader" style="display:none; text-align:center; color:var(--accent); margin-bottom:10px;"><i class="fas fa-spinner fa-spin"></i> Поиск в SoundCloud...</div>
    <div id="list">
        <p style="text-align:center; opacity:0.3; margin-top:50px;">Введите название и нажмите Enter</p>
    </div>
</div>

<div class="full-player" id="ui">
    <div onclick="toggleUI(false)"><i class="fas fa-chevron-down" style="font-size:24px;"></i></div>
    <div class="fp-cover"><img id="f-img" src=""></div>
    <div style="text-align:center;">
        <h2 id="f-title" style="margin:0; font-size:22px;"></h2>
        <p id="f-artist" style="opacity:0.5; margin:10px 0; font-size:16px;"></p>
    </div>
    <div class="prog-bg"><div id="prog-fill"></div></div>
    <div class="controls">
        <i class="fas fa-step-backward" style="opacity:0.2;"></i>
        <div class="play-btn" onclick="togglePlay()"><i id="p-icon" class="fas fa-play"></i></div>
        <i class="fas fa-step-forward" style="opacity:0.2;"></i>
    </div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    const widget = SC.Widget('sc-frame');
    const input = document.getElementById('scInput');
    const list = document.getElementById('list');
    const loader = document.getElementById('loader');

    // Ключ для публичного поиска (самый стабильный)
    const CID = '1IzwHiVxAHeYKAMqN0IIGD3ZARgJy2kl';

    async function performSearch(query) {
        if (!query) return;
        loader.style.display = 'block';
        list.innerHTML = '';

        try {
            // Используем публичный эндпоинт поиска
            const response = await fetch(`https://api-v2.soundcloud.com/search/tracks?q=${encodeURIComponent(query)}&client_id=${CID}&limit=15`);
            const data = await response.json();

            if (data.collection && data.collection.length > 0) {
                list.innerHTML = data.collection.map(t => {
                    const thumb = (t.artwork_url || t.user.avatar_url || '').replace('large', 't500x500');
                    const title = t.title.replace(/'/g, "");
                    return `
                        <div class="track-item" onclick="play('${t.permalink_url}', '${title}', '${t.user.username}', '${thumb}')">
                            <img src="${t.artwork_url || t.user.avatar_url || 'https://via.placeholder.com/50'}">
                            <div class="track-info">
                                <div class="t-name">${t.title}</div>
                                <div class="t-artist">${t.user.username}</div>
                            </div>
                            <i class="fas fa-play-circle" style="color:var(--accent); font-size:20px;"></i>
                        </div>
                    `;
                }).join('');
            } else {
                list.innerHTML = '<p style="text-align:center; opacity:0.5;">Ничего не найдено</p>';
            }
        } catch (e) {
            list.innerHTML = '<p style="text-align:center; color:red;">Ошибка. Вставьте ссылку на трек или попробуйте другое слово.</p>';
        } finally {
            loader.style.display = 'none';
        }
    }

    function play(url, title, artist, img) {
        document.getElementById('f-title').innerText = title;
        document.getElementById('f-artist').innerText = artist;
        document.getElementById('f-img').src = img || 'https://via.placeholder.com/300/111/fff?text=Notti';
        
        widget.load(url, { auto_play: true, visual: false });
        toggleUI(true);
        tg.HapticFeedback.impactOccurred('medium');
    }

    function togglePlay() { widget.toggle(); }
    function toggleUI(s) { document.getElementById('ui').classList.toggle('active', s); }

    input.onkeypress = (e) => {
        if(e.key === 'Enter') { performSearch(e.target.value); e.target.blur(); }
    };

    widget.bind(SC.Widget.Events.PLAY, () => { document.getElementById('p-icon').className = 'fas fa-pause'; });
    widget.bind(SC.Widget.Events.PAUSE, () => { document.getElementById('p-icon').className = 'fas fa-play'; });
    widget.bind(SC.Widget.Events.PLAY_PROGRESS, (p) => {
        document.getElementById('prog-fill').style.width = (p.relativePosition * 100) + '%';
    });

    window.onload = () => { tg.expand(); };
</script>
</body>
</html>
