<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Notti Music Final Fix</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://www.youtube.com/iframe_api"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root { --accent: #1DB954; --bg: #000; --card: #121212; }

        body, html {
            background: var(--bg); color: white; margin: 0; padding: 0;
            height: 100%; width: 100%; overflow: hidden; font-family: -apple-system, sans-serif;
        }

        .app { display: flex; flex-direction: column; height: 100vh; position: relative; }
        .page { flex: 1; overflow-y: auto; padding: 20px 20px 140px; display: none; -webkit-overflow-scrolling: touch; }
        .page.active { display: block; }

        /* ПЛЕЕР: Фикс геометрии */
        .full-player {
            position: fixed; inset: 0; background: #000; z-index: 9999;
            display: none; flex-direction: column; 
            padding: env(safe-area-inset-top) 25px env(safe-area-inset-bottom);
        }
        .full-player.active { display: flex; }

        .fp-middle { flex: 1; display: flex; align-items: center; justify-content: center; min-height: 0; }
        .fp-middle img {
            width: 100%; max-width: 300px; max-height: 300px; 
            aspect-ratio: 1/1; border-radius: 15px; object-fit: cover;
            box-shadow: 0 10px 40px rgba(0,0,0,0.8); background: #222;
        }

        .play-circle {
            width: 70px; height: 70px; background: white; color: black;
            border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 28px;
        }

        /* МИНИ ПЛЕЕР */
        .mini-player {
            position: fixed; bottom: 85px; left: 10px; right: 10px;
            height: 60px; background: var(--accent); border-radius: 12px;
            display: none; align-items: center; padding: 0 12px; z-index: 1000; color: #000;
        }
        .mini-player img { width: 40px; height: 40px; border-radius: 6px; margin-right: 12px; background: #000; }

        /* СПИСОК */
        .track-item { display: flex; align-items: center; margin-bottom: 12px; cursor: pointer; }
        .track-item img { width: 50px; height: 50px; border-radius: 8px; margin-right: 15px; background: #1a1a1a; }

        /* YouTube Container - Важен для работы звука */
        #yt-wrapper { position: fixed; top: 0; left: 0; width: 1px; height: 1px; opacity: 0.01; pointer-events: none; }

        nav { position: fixed; bottom: 0; width: 100%; height: 75px; background: #000; border-top: 1px solid #1a1a1a; display: flex; }
        nav div { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; opacity: 0.5; font-size: 11px; }
        nav div.active { opacity: 1; color: var(--accent); }
    </style>
</head>
<body>

<div id="yt-wrapper"><div id="yt-player"></div></div>

<div class="app">
    <div id="p-home" class="page active">
        <h2 style="margin-top:0;">Артисты</h2>
        <div style="display:flex; gap:15px; overflow-x:auto; padding-bottom:10px;" id="artists-list"></div>
        
        <h2>Поиск</h2>
        <input type="text" id="s-input" placeholder="Введите название..." style="width:100%; padding:15px; background:#111; border:none; border-radius:12px; color:#fff;">
        <div id="res" style="margin-top:20px;"></div>
    </div>

    <div id="p-settings" class="page">
        <h2>Опции</h2>
        <button onclick="location.reload()" style="width:100%; padding:15px; background:var(--accent); border:none; border-radius:12px; font-weight:bold;">Перезагрузить плеер</button>
    </div>

    <div class="mini-player" id="mini" onclick="setFull(true)">
        <img id="m-img" src="">
        <div style="flex:1; overflow:hidden; font-weight:bold; white-space:nowrap; text-overflow:ellipsis;" id="m-txt"></div>
        <i id="m-btn" class="fas fa-play" style="font-size:20px; padding:10px;" onclick="event.stopPropagation(); toggle();"></i>
    </div>

    <div class="full-player" id="full">
        <div style="padding:20px 0;" onclick="setFull(false)"><i class="fas fa-chevron-down" style="font-size:24px;"></i></div>
        <div class="fp-middle"><img id="f-img" src=""></div>
        <div style="padding:20px 0; text-align:center;">
            <h2 id="f-title" style="margin:0;"></h2>
            <p id="f-art" style="opacity:0.6; margin-top:5px;"></p>
            <div style="display:flex; align-items:center; justify-content:center; gap:40px; margin-top:30px;">
                <i class="fas fa-step-backward" style="font-size:24px;" onclick="prev()"></i>
                <div class="play-circle" onclick="toggle()"><i id="f-btn" class="fas fa-play"></i></div>
                <i class="fas fa-step-forward" style="font-size:24px;" onclick="next()"></i>
            </div>
        </div>
    </div>

    <nav>
        <div class="active" onclick="tab('p-home', this)"><i class="fas fa-search"></i>Поиск</div>
        <div onclick="tab('p-settings', this)"><i class="fas fa-cog"></i>Настройки</div>
    </nav>
</div>

<script>
    let player, playlist = [], cur = -1;
    const tg = window.Telegram.WebApp;

    const artistsData = [
        { name: "Платина", id: "557879201" },
        { name: "OG Buda", id: "518341604" },
        { name: "FRIENDLY THUG", id: "1085273392" }
    ];

    function onYouTubeIframeAPIReady() {
        player = new YT.Player('yt-player', {
            height: '1', width: '1',
            playerVars: { 'autoplay': 1, 'playsinline': 1, 'controls': 0 },
            events: { 'onStateChange': (e) => {
                const isP = e.data === 1;
                document.getElementById('m-btn').className = isP ? 'fas fa-pause' : 'fas fa-play';
                document.getElementById('f-btn').className = isP ? 'fas fa-pause' : 'fas fa-play';
            }}
        });
    }

    function renderArtists() {
        document.getElementById('artists-list').innerHTML = artistsData.map(a => `
            <div onclick="search('${a.name}')" style="min-width:90px; text-align:center;">
                <div style="width:80px; height:80px; background:linear-gradient(45deg, #222, #444); border-radius:50%; margin:0 auto; display:flex; align-items:center; justify-content:center;">
                    <i class="fas fa-user" style="font-size:30px; opacity:0.3;"></i>
                </div>
                <p style="font-size:11px; margin-top:8px;">${a.name}</p>
            </div>
        `).join('');
    }

    async function search(q) {
        const r = await fetch(`/api/search?q=${encodeURIComponent(q + " Official")}`);
        const d = await r.json(); playlist = d;
        document.getElementById('res').innerHTML = d.map((t, i) => {
            // ФИКС ПРЕВЬЮ: Используем hqdefault для надежности
            const thumb = `https://i.ytimg.com/vi/${t.id}/hqdefault.jpg`;
            return `
            <div class="track-item" onclick="play(${i})">
                <img src="${thumb}" onerror="this.src='https://via.placeholder.com/150/222/fff?text=Music'">
                <div style="overflow:hidden;">
                    <div style="font-weight:bold; white-space:nowrap; text-overflow:ellipsis;">${t.title}</div>
                    <div style="opacity:0.5; font-size:12px;">${t.artist}</div>
                </div>
            </div>
        `}).join('');
    }

    function play(i) {
        cur = i; const t = playlist[i];
        const thumb = `https://i.ytimg.com/vi/${t.id}/hqdefault.jpg`;
        
        document.getElementById('mini').style.display = 'flex';
        document.getElementById('m-img').src = thumb;
        document.getElementById('f-img').src = thumb;
        document.getElementById('m-txt').innerText = t.title;
        document.getElementById('f-title').innerText = t.title;
        document.getElementById('f-art').innerText = t.artist;
        
        player.loadVideoById(t.id);
        player.playVideo();
        player.unMute();
        tg.HapticFeedback.impactOccurred('medium');
    }

    function toggle() {
        if(player.getPlayerState() === 1) player.pauseVideo();
        else player.playVideo();
    }

    function setFull(s) { document.getElementById('full').classList.toggle('active', s); }
    function tab(p, e) {
        document.querySelectorAll('.page').forEach(x => x.classList.remove('active'));
        document.getElementById(p).classList.add('active');
        document.querySelectorAll('nav div').forEach(x => x.classList.remove('active'));
        e.classList.add('active');
    }

    document.getElementById('s-input').onkeypress = (e) => { if(e.key === 'Enter') search(e.target.value); };
    function next() { if(cur < playlist.length - 1) play(cur + 1); }
    function prev() { if(cur > 0) play(cur - 1); }

    window.onload = () => { renderArtists(); tg.expand(); };
</script>
</body>
</html>
