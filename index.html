<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Notti Spotify Style</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --spotify-green: #1DB954;
            --bg-black: #121212;
            --card-grey: #181818;
            --text-grey: #b3b3b3;
        }

        body {
            background-color: var(--bg-black);
            color: white;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            padding-bottom: 90px; /* Отступ под плеер и меню */
        }

        header {
            padding: 20px;
            background: linear-gradient(to bottom, #222222, var(--bg-black));
        }

        h1 { font-size: 24px; margin-bottom: 20px; }

        /* Сетка плейлистов */
        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            padding: 0 15px;
        }

        .category-card {
            background: var(--card-grey);
            border-radius: 8px;
            padding: 15px;
            text-align: left;
            transition: background 0.3s;
        }

        .category-card:active { background: #282828; }

        .category-card i {
            font-size: 24px;
            margin-bottom: 10px;
            color: var(--spotify-green);
        }

        /* Мини-плеер внизу */
        .mini-player {
            position: fixed;
            bottom: 60px;
            left: 10px;
            right: 10px;
            background: #282828;
            border-radius: 8px;
            padding: 8px 15px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            z-index: 100;
        }

        .track-info { display: flex; align-items: center; }
        .track-info img { width: 40px; height: 40px; border-radius: 4px; margin-right: 10px; }
        .track-title { font-size: 14px; font-weight: 500; }
        .track-artist { font-size: 12px; color: var(--text-grey); }

        /* Нижнее меню */
        nav {
            position: fixed;
            bottom: 0;
            width: 100%;
            background: rgba(0, 0, 0, 0.95);
            display: flex;
            justify-content: space-around;
            padding: 10px 0;
            border-top: 1px solid #282828;
        }

        nav a {
            color: var(--text-grey);
            text-decoration: none;
            font-size: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        nav a.active { color: white; }
        nav a i { font-size: 20px; margin-bottom: 4px; }

    </style>
</head>
<body>

<header>
    <h1>Добрый день</h1>
</header>

<div class="grid">
    <div class="category-card"><i class="fab fa-spotify"></i><div>Spotify Mix</div></div>
    <div class="category-card"><i class="fab fa-youtube"></i><div>YouTube Hits</div></div>
    <div class="category-card"><i class="fab fa-soundcloud"></i><div>SoundCloud</div></div>
    <div class="category-card"><i class="fas fa-heart"></i><div>Любимое</div></div>
</div>

<div class="mini-player">
    <div class="track-info">
        <img src="https://via.placeholder.com/40" alt="cover">
        <div>
            <div class="track-title">Название трека</div>
            <div class="track-artist">Исполнитель</div>
        </div>
    </div>
    <div class="controls">
        <i class="fas fa-play" style="font-size: 20px;"></i>
    </div>
</div>

<nav>
    <a href="#" class="active"><i class="fas fa-home"></i>Главная</a>
    <a href="#"><i class="fas fa-search"></i>Поиск</a>
    <a href="#"><i class="fas fa-layer-group"></i>Библиотека</a>
</nav>

<script>
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();
    tg.setHeaderColor('#121212'); // Цвет шапки в тон приложения
</script>

</body>
</html>
