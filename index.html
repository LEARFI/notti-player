<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Notti Music Native</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root { --accent: #1DB954; --bg: #000; }
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body, html { 
            background: var(--bg); color: white; margin: 0; padding: 0; 
            height: 100vh; overflow: hidden; font-family: -apple-system, system-ui, sans-serif; 
        }

        .app { display: flex; flex-direction: column; height: 100vh; }

        /* Страницы */
        .page { flex: 1; overflow-y: auto; padding: 20px 20px 150px; display: none; }
        .page.active { display: block; }

        /* Сетка артистов */
        .artist-item { min-width: 100px; text-align: center; cursor: pointer; }
        .artist-img { 
            width: 90px; height: 90px; border-radius: 50%; 
            object-fit: cover; background: #222; margin-bottom: 8px;
            border: 1px solid #333;
        }

        /* ПОЛНОЭКРАННЫЙ ПЛЕЕР (Исправленная геометрия) */
        .full-player {
            position: fixed; inset: 0; background: #000; z-index: 9999;
            display: none; flex-direction: column;
            padding: env(safe-area-inset-top) 30px env(safe-area-inset-bottom);
        }
        .full-player.active { display: flex; animation: slideIn 0.3s ease-out; }

        .fp-header { height: 60px; display: flex; align-items: center; justify-content: space-between; }
        
        /* Контейнер обложки - теперь она не распирает экран */
        .fp-cover-area {
            flex: 1; display: flex; align-items: center; justify-content: center;
            min-height: 0; padding: 20px 0;
        }
        .fp-cover-area img {
            max-width: 100%; max-height: 100%; aspect-ratio: 1/1;
            border-radius: 24px; object-fit: cover;
            box-shadow: 0 20px 60px rgba(0,0,0,0.8);
        }

        .fp-info { padding-bottom: 30px; }
        .fp-info h1 { font-size: 26px; margin: 0; font-weight: 800; }
        .fp-info p { font-size: 18px; color: #b3b3b3; margin: 8px 0 0; }

        /* Прогресс-бар */
        .progress-container { width: 100%; height: 4px; background: #333; border-radius: 2px; margin-bottom: 40px; position: relative; }
        #progress { height: 100%; background: #fff; border-radius: 2px; width: 0%; }

        .fp-controls {
            display: flex; align-items: center; justify-content: space-between;
            padding-bottom: 40px;
        }
        .play-btn {
            width: 80px; height: 80px; background: white; color: black;
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-size: 32px;
        }

        /* Навигация */
        nav { 
            position: fixed; bottom: 0; width: 100%; height: 75px; 
            background: rgba(0,0,0,0.9); display: flex; border-top: 1px solid #111;
            padding-bottom: env(safe-area-inset-bottom);
        }
        nav div { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; opacity: 0.5; font-size: 11px; }
        nav div.active { opacity: 1; color: var(--accent); }

        @keyframes slideIn { from { transform: translateY(100%); } to { transform: translateY(0); } }
    </style>
</head>
<body>

<div class="app">
    <div id="p-home" class="page active">
        <h2 style="font-size: 28px; font-weight: 800;">Артисты</h2>
        <div style="display: flex; gap: 15px; overflow-x: auto; padding-bottom: 20px;" id="artists"></div>
        
        <h2>Тренды</h2>
        <div id="tracks-list"></div>
    </div>

    <div class="full-player" id="player-ui">
        <div class="fp-header">
            <i class="fas fa-chevron-down" onclick="toggleUI(false)" style="font-size: 24px;"></i>
            <span style="text-transform: uppercase; font-size: 12px; letter-spacing: 2px; opacity: 0.6;">Notti Music</span>
            <i class="fas fa-ellipsis-h"></i>
        </div>

        <div class="fp-cover-area">
            <img id="f-img" src="" alt="cover">
        </div>

        <div class="fp-info">
            <h1 id="f-title">Название</h1>
            <p id="f-artist">Исполнитель</p>
        </div>

        <div class="progress-container">
            <div id="progress"></div>
        </div>

        <div class="fp-controls">
            <i class="fas fa-random" style="opacity: 0.5;"></i>
            <i class="fas fa-step-backward" style="font-size: 28px;"></i>
            <div class="play-btn" onclick="togglePlay()">
                <i id="p-icon" class="fas fa-play"></i>
            </div>
            <i class="fas fa-step-forward" style="font-size: 28px;"></i>
            <i class="fas fa-redo" style="opacity: 0.5;"></i>
        </div>
    </div>

    <nav>
        <div class="active"><i class="fas fa-home"></i>Главная</div>
        <div><i class="fas fa-search"></i>Поиск</div>
        <div><i class="fas fa-heart"></i>Любимое</div>
        <div onclick="switchTab('p-home')"><i class="fas fa-user"></i>Профиль</div>
    </nav>
</div>

<script>
    const tg = window.Telegram.WebApp;
    const audio = new Audio();
    let isPlaying = false;

    // База данных (в реальном приложении это будет приходить с сервера)
    const musicData = [
        { 
            title: "Хенни", 
            artist: "Платина", 
            img: "https://e-cdns-images.dzcdn.net/images/cover/61665e71887e04918f0a05845239a2d6/500x500.jpg",
            url: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" // Замени на свои MP3
        },
        { 
            title: "Легенда", 
            artist: "OG Buda", 
            img: "https://e-cdns-images.dzcdn.net/images/cover/9875f5436c9443586a345a98/500x500.jpg",
            url: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3"
        }
    ];

    const artists = [
        { name: "Платина", img: "https://i.scdn.co/image/ab6761610000e5ebc18600d58852655a6d573512" },
        { name: "OG Buda", img: "https://i.scdn.co/image/ab6761610000e5eb9875f5436c9443586a345a98" },
        { name: "Friendly Thug", img: "https://i.scdn.co/image/ab6761610000e5eb559810775d799988a87c5305" }
    ];

    function init() {
        // Рендер артистов
        document.getElementById('artists').innerHTML = artists.map(a => `
            <div class="artist-item">
                <img src="${a.img}" class="artist-img">
                <div style="font-size:12px;">${a.name}</div>
            </div>
        `).join('');

        // Рендер треков
        document.getElementById('tracks-list').innerHTML = musicData.map((t, i) => `
            <div style="display:flex; align-items:center; margin-bottom:15px;" onclick="playTrack(${i})">
                <img src="${t.img}" style="width:50px; height:50px; border-radius:8px; margin-right:15px;">
                <div>
                    <div style="font-weight:bold;">${t.title}</div>
                    <div style="opacity:0.5; font-size:12px;">${t.artist}</div>
                </div>
            </div>
        `).join('');

        tg.expand();
    }

    function playTrack(i) {
        const t = musicData[i];
        document.getElementById('f-img').src = t.img;
        document.getElementById('f-title').innerText = t.title;
        document.getElementById('f-artist').innerText = t.artist;
        
        audio.src = t.url;
        audio.play();
        isPlaying = true;
        updateIcon();
        toggleUI(true);
        
        tg.HapticFeedback.impactOccurred('medium');
    }

    function togglePlay() {
        if (isPlaying) audio.pause(); else audio.play();
        isPlaying = !isPlaying;
        updateIcon();
    }

    function updateIcon() {
        document.getElementById('p-icon').className = isPlaying ? 'fas fa-pause' : 'fas fa-play';
    }

    function toggleUI(show) {
        document.getElementById('player-ui').classList.toggle('active', show);
    }

    // Обновление прогресс-бара
    audio.ontimeupdate = () => {
        const pct = (audio.currentTime / audio.duration) * 100;
        document.getElementById('progress').style.width = pct + '%';
    };

    init();
</script>
</body>
</html>
