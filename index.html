<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Notti Music 2.0</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://www.youtube.com/iframe_api"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --accent: #ff2d55; --bg: #000; --card: #1c1c1e; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: white; font-family: -apple-system, BlinkMacSystemFont, sans-serif; margin: 0; padding: 20px; overflow-x: hidden; }

        /* Поиск */
        .header { position: sticky; top: 0; background: var(--bg); z-index: 100; padding-bottom: 15px; }
        #searchInput { width: 100%; padding: 14px 20px; border-radius: 12px; border: none; background: var(--card); color: white; font-size: 17px; font-weight: 500; }

        /* Сетка треков */
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 10px; }
        .track-card { background: var(--card); border-radius: 14px; overflow: hidden; transition: transform 0.2s; }
        .track-card:active { transform: scale(0.96); }
        .track-card img { width: 100%; aspect-ratio: 1/1; object-fit: cover; display: block; }
        .track-info { padding: 10px; }
        .track-title { font-size: 14px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .track-artist { font-size: 12px; color: #8e8e93; margin-top: 3px; }

        /* Плеер (Apple Style) */
        #player-ui { position: fixed; bottom: 20px; left: 15px; right: 15px; height: 64px; background: rgba(44, 44, 46, 0.95); backdrop-filter: blur(20px); border-radius: 14px; display: none; align-items: center; padding: 0 15px; z-index: 1000; box-shadow: 0 8px 30px rgba(0,0,0,0.5); }
        #player-ui img { width: 44px; height: 44px; border-radius: 6px; margin-right: 12px; }
        .p-text { flex: 1; overflow: hidden; }
        .p-title { font-size: 15px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .p-controls { display: flex; align-items: center; gap: 20px; }
        .p-play { font-size: 24px; color: white; width: 30px; text-align: center; }

        /* Скрытый движок */
        #yt-engine { position: absolute; top: -1000px; opacity: 0; }
        .loading { text-align: center; padding: 40px; color: var(--accent); display: none; }
    </style>
</head>
<body>

<div id="yt-engine"></div>

<div class="header">
    <h1 style="font-size: 34px; margin: 0 0 15px;">Поиск</h1>
    <input type="text" id="searchInput" placeholder="Артист, песня или альбом">
</div>

<div id="loader" class="loading"><i class="fas fa-spinner fa-spin fa-2x"></i></div>
<div id="grid" class="grid"></div>

<div id="player-ui">
    <img id="p-img" src="">
    <div class="p-text">
        <div id="p-name" class="p-title">Название</div>
        <div style="font-size: 12px; color: #8e8e93;">Сейчас играет</div>
    </div>
    <div class="p-controls">
        <div onclick="togglePlay()"><i id="p-icon" class="fas fa-play p-play"></i></div>
    </div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    const API_KEY = 'AIzaSyBYuWcCFDO-FPZXhK-AnIxw7nLGeGzwSHw';
    let player, isPlaying = false;

    // Инициализация YouTube
    function onYouTubeIframeAPIReady() {
        player = new YT.Player('yt-engine', {
            height: '0', width: '0',
            events: { 
                'onStateChange': (e) => {
                    isPlaying = (e.data === YT.PlayerState.PLAYING);
                    document.getElementById('p-icon').className = isPlaying ? 'fas fa-pause p-play' : 'fas fa-play p-play';
                },
                'onError': () => alert('Ошибка воспроизведения. Попробуйте другой трек.')
            }
        });
    }

    async function search(q) {
        if (!q) return;
        document.getElementById('loader').style.display = 'block';
        const grid = document.getElementById('grid');
        grid.innerHTML = '';

        try {
            const res = await fetch(`https://www.googleapis.com/youtube/v3/search?part=snippet&q=${encodeURIComponent(q + ' music')}&key=${API_KEY}&type=video&maxResults=12`);
            const data = await res.json();
            
            data.items.forEach(item => {
                const vid = item.id.videoId;
                const title = item.snippet.title;
                const thumb = item.snippet.thumbnails.high.url;
                const channel = item.snippet.channelTitle;

                grid.innerHTML += `
                    <div class="track-card" onclick="playMusic('${vid}', '${title.replace(/'/g, "")}', '${thumb}')">
                        <img src="${thumb}">
                        <div class="track-info">
                            <div class="track-title">${title}</div>
                            <div class="track-artist">${channel}</div>
                        </div>
                    </div>`;
            });
        } catch (e) { alert('Лимит поиска исчерпан или нет сети'); }
        document.getElementById('loader').style.display = 'none';
    }

    function playMusic(id, title, img) {
        document.getElementById('player-ui').style.display = 'flex';
        document.getElementById('p-name').innerText = title;
        document.getElementById('p-img').src = img;
        
        player.loadVideoById(id);
        tg.HapticFeedback.impactOccurred('medium');
    }

    function togglePlay() {
        if (isPlaying) player.pauseVideo(); else player.playVideo();
    }

    document.getElementById('searchInput').onkeypress = (e) => {
        if (e.key === 'Enter') { search(e.target.value); e.target.blur(); }
    };

    window.onload = () => { tg.expand(); search('Hits 2024'); };
</script>
</body>
</html>
