<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Notti Multi-Platform</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://www.youtube.com/iframe_api"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --accent: #1DB954;
            --bg: #000;
            --card-bg: rgba(255, 255, 255, 0.05);
            --safe-bottom: env(safe-area-inset-bottom);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--bg);
            color: white;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            overflow: hidden;
        }

        /* --- Адаптивная обертка --- */
        .app-container {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        /* Стили для ПК */
        @media (min-width: 1024px) {
            .app-container { max-width: 1200px; flex-direction: row; }
            nav { 
                position: relative !important; width: 250px !important; 
                height: 100% !important; flex-direction: column !important; 
                justify-content: flex-start !important; padding: 40px 20px !important;
                border-right: 1px solid rgba(255,255,255,0.1);
            }
            nav a { margin-bottom: 20px; flex: none !important; text-align: left !important; display: flex !important; align-items: center; gap: 15px; font-size: 16px !important; }
            .content-area { padding: 40px !important; }
        }

        /* Стили для iPhone (Safe Areas) */
        @supports (-webkit-touch-callout: none) {
            .page h1 { text-align: center; font-size: 28px; }
            nav { padding-bottom: calc(15px + var(--safe-bottom)) !important; }
        }

        .content-area { flex: 1; overflow-y: auto; padding: 20px; padding-bottom: 100px; }
        .page { display: none; animation: fadeIn 0.4s ease; }
        .active-page { display: block; }

        /* --- Поиск Минимал --- */
        .search-minimal {
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding: 10px 0;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            transition: 0.3s;
        }
        .search-minimal:focus-within { border-bottom-color: var(--accent); }
        .search-minimal input {
            background: none; border: none; color: white; width: 100%;
            font-size: 18px; outline: none; margin-left: 15px; font-weight: 300;
        }

        /* --- Любимые исполнители --- */
        .artists-row {
            display: flex; gap: 20px; overflow-x: auto; padding: 10px 0 30px;
            scrollbar-width: none;
        }
        .artists-row::-webkit-scrollbar { display: none; }
        .artist-card { text-align: center; min-width: 80px; }
        .artist-img {
            width: 80px; height: 80px; border-radius: 50%;
            object-fit: cover; margin-bottom: 8px;
            border: 2px solid transparent; transition: 0.3s;
        }
        .artist-card:active .artist-img { transform: scale(0.9); border-color: var(--accent); }
        .artist-name { font-size: 11px; opacity: 0.7; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* --- Навигация --- */
        nav {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: rgba(0,0,0,0.8); backdrop-filter: blur(20px);
            display: flex; justify-content: space-around;
            padding: 12px 0; z-index: 1000;
        }
        nav a { color: #888; text-decoration: none; text-align: center; font-size: 10px; flex: 1; transition: 0.2s; }
        nav a.active { color: white; transform: translateY(-2px); }
        nav a i { font-size: 22px; display: block; margin-bottom: 4px; }

        /* --- Плеер (Full) --- */
        #full-player {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: #000; z-index: 2000;
            transform: translateY(100%); transition: 0.6s cubic-bezier(0.16, 1, 0.3, 1);
            display: flex; flex-direction: column; align-items: center; padding: 60px 30px;
        }
        #full-player.open { transform: translateY(0); }

        .f-img { width: 100%; max-width: 350px; aspect-ratio: 1/1; border-radius: 30px; object-fit: cover; box-shadow: 0 30px 60px rgba(0,0,0,0.5); }
        
        /* Лайк Анимация */
        .like-btn { font-size: 28px; transition: 0.3s; cursor: pointer; }
        .liked { color: #ff2d55 !important; animation: pop 0.4s ease; }
        @keyframes pop { 
            0% { transform: scale(1); } 
            50% { transform: scale(1.4); } 
            100% { transform: scale(1); } 
        }

        #yt-player { position: absolute; visibility: hidden; pointer-events: none; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

<div class="app-container">
    <div id="yt-player"></div>

    <nav id="main-nav">
        <a href="#" onclick="showPage('home', this)" class="active"><i class="fas fa-home"></i><span>Домой</span></a>
        <a href="#" onclick="showPage('search', this)"><i class="fas fa-search"></i><span>Поиск</span></a>
        <a href="#" onclick="showPage('favorites', this)"><i class="fas fa-heart"></i><span>Медиатека</span></a>
    </nav>

    <div class="content-area">
        <div id="home" class="page active-page">
            <h1 style="font-weight: 800; letter-spacing: -1px; margin-bottom: 30px;">Твой микс</h1>
            
            <p style="text-transform: uppercase; font-size: 11px; letter-spacing: 1px; opacity: 0.5;">Любимые исполнители</p>
            <div class="artists-row" id="fav-artists">
                </div>

            <div onclick="playMyWave()" style="background: linear-gradient(135deg, #333, #000); padding: 30px; border-radius: 25px; border: 1px solid rgba(255,255,255,0.1);">
                <h2 style="margin:0"><i class="fas fa-wave-square" style="color:var(--accent)"></i> Моя волна</h2>
                <p style="opacity:0.5; font-size:13px;">На основе твоих предпочтений</p>
            </div>
        </div>

        <div id="search" class="page">
            <div class="search-minimal">
                <i class="fas fa-search" style="opacity: 0.3;"></i>
                <input type="text" id="search-input" placeholder="Поиск музыки">
            </div>
            <div id="search-results"></div>
        </div>

        <div id="favorites" class="page">
            <h2 style="font-weight: 800;">Избранное</h2>
            <div id="fav-results"></div>
        </div>
    </div>
</div>

<div id="full-player">
    <div style="width:100%; display:flex; justify-content:space-between; opacity:0.3;" onclick="closeFullPlayer()">
        <i class="fas fa-chevron-down"></i>
        <span>NOTTI PLAYER</span>
        <i class="fas fa-ellipsis-h"></i>
    </div>

    <div style="margin-top: 50px; width: 100%; display: flex; justify-content: center;">
        <img id="f-img" class="f-img" src="">
    </div>

    <div style="width:100%; margin-top: 40px; display: flex; justify-content: space-between; align-items: center;">
        <div style="overflow: hidden;">
            <div id="f-title" style="font-size:24px; font-weight:800; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">Песня</div>
            <div id="f-artist" style="font-size:18px; opacity:0.5; margin-top:5px;">Исполнитель</div>
        </div>
        <i id="like-btn" class="far fa-heart like-btn" onclick="toggleLike()"></i>
    </div>

    <input type="range" id="progress-slider" value="0" style="width:100%; margin-top:35px;" oninput="seekTrack(this.value)">
    
    <div style="display:flex; align-items:center; gap:50px; margin-top:50px;">
        <i class="fas fa-backward-step" style="font-size:30px;" onclick="prevTrack()"></i>
        <i id="f-play-icon" class="fas fa-play" style="font-size:45px;" onclick="togglePlay()"></i>
        <i class="fas fa-forward-step" style="font-size:30px;" onclick="nextTrack()"></i>
    </div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    let player, currentPlaylist = [], currentIndex = -1;
    let favorites = JSON.parse(localStorage.getItem('notti_favs')) || [];

    // Список любимых исполнителей (Пример)
    const favoriteArtists = [
        { name: "Платина", img: "https://i.ytimg.com/vi/q1v_4x-A-Y4/hqdefault.jpg" },
        { name: "Scally Milano", img: "https://i.ytimg.com/vi/5-XwS3X_8k8/hqdefault.jpg" },
        { name: "Friendly Thug", img: "https://i.ytimg.com/vi/j5O6I-qG2Gk/hqdefault.jpg" },
        { name: "OG Buda", img: "https://i.ytimg.com/vi/uYn8I_D0j_U/hqdefault.jpg" }
    ];

    function onYouTubeIframeAPIReady() {
        player = new YT.Player('yt-player', {
            events: { 'onStateChange': (e) => {
                document.getElementById('f-play-icon').className = e.data === 1 ? 'fas fa-pause' : 'fas fa-play';
                if(e.data === 0) nextTrack();
            }}
        });
    }

    function renderArtists() {
        const cont = document.getElementById('fav-artists');
        cont.innerHTML = favoriteArtists.map(a => `
            <div class="artist-card" onclick="startArtistRadio('${a.name}')">
                <img src="${a.img}" class="artist-img">
                <div class="artist-name">${a.name}</div>
            </div>
        `).join('');
    }

    async function startArtistRadio(name) {
        const res = await fetch(`/api/search?q=${encodeURIComponent(name)}`);
        const tracks = await res.json();
        if(tracks.length > 0) playTrack(tracks[0].id, tracks[0].title, tracks[0].artist, tracks[0].img, tracks);
    }

    async function playTrack(id, title, artist, img, list = []) {
        currentPlaylist = list;
        currentIndex = currentPlaylist.findIndex(t => t.id === id);
        
        document.getElementById('f-img').src = img.replace('default', 'hqdefault');
        document.getElementById('f-title').innerText = title;
        document.getElementById('f-artist').innerText = artist;
        
        const isFav = favorites.some(t => t.id === id);
        document.getElementById('like-btn').className = isFav ? 'fas fa-heart like-btn liked' : 'far fa-heart like-btn';

        openFullPlayer();
        player.loadVideoById(id);
        player.playVideo();
        tg.HapticFeedback.impactOccurred('light');
    }

    function toggleLike() {
        const track = currentPlaylist[currentIndex];
        const btn = document.getElementById('like-btn');
        const idx = favorites.findIndex(t => t.id === track.id);

        if(idx === -1) {
            favorites.push(track);
            btn.classList.add('liked', 'fas');
            btn.classList.remove('far');
            tg.HapticFeedback.notificationOccurred('success');
        } else {
            favorites.splice(idx, 1);
            btn.classList.remove('liked', 'fas');
            btn.classList.add('far');
            tg.HapticFeedback.impactOccurred('medium');
        }
        localStorage.setItem('notti_favs', JSON.stringify(favorites));
        renderFavorites();
    }

    function showPage(pageId, el) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
        document.getElementById(pageId).classList.add('active-page');
        document.querySelectorAll('nav a').forEach(a => a.classList.remove('active'));
        el.classList.add('active');
    }

    function openFullPlayer() { document.getElementById('full-player').classList.add('open'); }
    function closeFullPlayer() { document.getElementById('full-player').classList.remove('open'); }
    function togglePlay() { player.getPlayerState() === 1 ? player.pauseVideo() : player.playVideo(); }
    
    function nextTrack() { if(currentIndex < currentPlaylist.length - 1) { currentIndex++; const t = currentPlaylist[currentIndex]; playTrack(t.id, t.title, t.artist, t.img); } }
    function prevTrack() { if(currentIndex > 0) { currentIndex--; const t = currentPlaylist[currentIndex]; playTrack(t.id, t.title, t.artist, t.img); } }

    document.getElementById('search-input').oninput = async function() {
        if(this.value.length > 2) {
            const res = await fetch(`/api/search?q=${encodeURIComponent(this.value)}`);
            const tracks = await res.json();
            document.getElementById('search-results').innerHTML = tracks.map(t => `
                <div style="display:flex; align-items:center; margin-bottom:20px;" onclick="playTrack('${t.id}','${t.title}','${t.artist}','${t.img}', ${JSON.stringify(tracks).replace(/"/g, '&quot;')})">
                    <img src="${t.img}" style="width:50px; height:50px; border-radius:10px; margin-right:15px; object-fit:cover;">
                    <div>
                        <div style="font-weight:600; font-size:15px;">${t.title}</div>
                        <div style="opacity:0.5; font-size:13px;">${t.artist}</div>
                    </div>
                </div>
            `).join('');
        }
    };

    function renderFavorites() {
        const cont = document.getElementById('fav-results');
        cont.innerHTML = favorites.map(t => `
            <div style="display:flex; align-items:center; margin-bottom:15px;" onclick="playTrack('${t.id}','${t.title}','${t.artist}','${t.img}', favorites)">
                <img src="${t.img}" style="width:50px; height:50px; border-radius:10px; margin-right:15px; object-fit:cover;">
                <div><div style="font-weight:600;">${t.title}</div><div style="opacity:0.5;">${t.artist}</div></div>
            </div>
        `).join('') || '<p style="opacity:0.3; text-align:center;">Пусто</p>';
    }

    window.onload = () => { renderArtists(); renderFavorites(); };
</script>
</body>
</html>
