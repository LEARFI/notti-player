<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Notti Music Ultimate</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root { --accent: #ff5500; --bg: #000; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body, html { background: var(--bg); color: white; margin: 0; padding: 0; height: 100vh; overflow: hidden; font-family: -apple-system, sans-serif; }
        
        .app { display: flex; flex-direction: column; height: 100vh; }
        .page { flex: 1; overflow-y: auto; padding: 20px 20px 150px; display: none; }
        .page.active { display: block; }

        /* Поиск */
        .search-container { position: sticky; top: 0; background: var(--bg); padding: 10px 0; z-index: 100; }
        #scInput { width: 100%; padding: 16px; border-radius: 12px; border: 1px solid #333; background: #111; color: #fff; font-size: 16px; }
        #scInput:focus { border-color: var(--accent); }

        /* Карточки треков */
        .track-item { display: flex; align-items: center; padding: 10px; background: #0c0c0c; border-radius: 12px; margin-bottom: 10px; transition: 0.2s; }
        .track-item:active { background: #1a1a1a; transform: scale(0.98); }
        .track-item img { width: 50px; height: 50px; border-radius: 8px; margin-right: 15px; background: #222; }
        .track-info { flex: 1; overflow: hidden; }
        .t-name { font-weight: bold; white-space: nowrap; text-overflow: ellipsis; overflow: hidden; }
        .t-artist { opacity: 0.5; font-size: 12px; margin-top: 2px; }

        /* Плеер */
        .full-player { position: fixed; inset: 0; background: #000; z-index: 9999; display: none; flex-direction: column; padding: env(safe-area-inset-top) 30px env(safe-area-inset-bottom); }
        .full-player.active { display: flex; }
        .fp-cover { flex: 1; display: flex; align-items: center; justify-content: center; min-height: 0; }
        .fp-cover img { max-width: 100%; max-height: 80%; aspect-ratio: 1/1; border-radius: 15px; box-shadow: 0 10px 50px rgba(255,85,0,0.2); }

        .prog-bg { width: 100%; height: 4px; background: #222; border-radius: 2px; margin-bottom: 40px; cursor: pointer; }
        #prog-fill { height: 100%; background: var(--accent); width: 0%; border-radius: 2px; }

        .controls { display: flex; align-items: center; justify-content: space-around; padding-bottom: 40px; }
        .play-main { width: 75px; height: 75px; background: #fff; color: #000; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 30px; }

        nav { position: fixed; bottom: 0; width: 100%; height: 75px; background: rgba(0,0,0,0.95); display: flex; border-top: 1px solid #111; z-index: 1000; }
        nav div { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; opacity: 0.4; font-size: 10px; }
        nav div.active { opacity: 1; color: var(--accent); }
    </style>
</head>
<body>

<div class="app">
    <div id="p-home" class="page active">
        <h1 style="font-size: 30px; color: var(--accent);">Notti Music</h1>
        <div class="search-container">
            <input type="text" id="scInput" placeholder="Поиск в SoundCloud...">
        </div>
        <div id="loader" style="display:none; text-align:center; padding:20px; color:var(--accent);"><i class="fas fa-spinner fa-spin"></i></div>
        <div id="list"></div>
    </div>

    <div class="full-player" id="ui">
        <div onclick="toggleUI(false)" style="padding:15px 0;"><i class="fas fa-chevron-down" style="font-size:24px;"></i></div>
        <div class="fp-cover"><img id="f-img" src=""></div>
        <div style="text-align:center; margin-bottom:20px;">
            <h2 id="f-title" style="margin:0;"></h2>
            <p id="f-artist" style="opacity:0.5; margin:8px 0;"></p>
        </div>
        <div class="prog-bg" onclick="seek(event)"><div id="prog-fill"></div></div>
        <div class="controls">
            <i class="fas fa-step-backward" onclick="skip(-1)" style="font-size:28px;"></i>
            <div class="play-main" onclick="toggle()"><i id="p-icon" class="fas fa-play"></i></div>
            <i class="fas fa-step-forward" onclick="skip(1)" style="font-size:28px;"></i>
        </div>
    </div>

    <nav>
        <div class="active"><i class="fas fa-home" style="font-size:22px; margin-bottom:4px;"></i>Главная</div>
        <div onclick="toggleUI(true)"><i class="fas fa-play-circle" style="font-size:22px; margin-bottom:4px;"></i>Плеер</div>
    </nav>
</div>

<script>
    const tg = window.Telegram.WebApp;
    const cid = '1IzwHiVxAHeYKAMqN0IIGD3ZARgJy2kl';
    const audio = new Audio();
    let isPlaying = false, idx = 0, queue = [];

    async function search(q) {
        if(!q) return;
        document.getElementById('loader').style.display = 'block';
        try {
            const r = await fetch(`https://api-v2.soundcloud.com/search/tracks?q=${encodeURIComponent(q)}&client_id=${cid}&limit=20`);
            const d = await r.json();
            queue = d.collection.map(t => ({
                title: t.title,
                artist: t.user.username,
                img: (t.artwork_url || t.user.avatar_url || '').replace('large', 't500x500'),
                url: `https://api.soundcloud.com/tracks/${t.id}/stream?client_id=${cid}`
            }));
            render();
        } catch (e) { alert("Ошибка поиска. Попробуйте другое слово."); }
        document.getElementById('loader').style.display = 'none';
    }

    function render() {
        document.getElementById('list').innerHTML = queue.map((t, i) => `
            <div class="track-item" onclick="play(${i})">
                <img src="${t.img || 'https://via.placeholder.com/150/222/fff?text=No+Art'}">
                <div class="track-info">
                    <div class="t-name">${t.title}</div>
                    <div class="t-artist">${t.artist}</div>
                </div>
                <i class="fas fa-play" style="color:var(--accent); font-size:18px;"></i>
            </div>
        `).join('');
    }

    function play(i) {
        idx = i; const t = queue[i];
        document.getElementById('f-img').src = t.img;
        document.getElementById('f-title').innerText = t.title;
        document.getElementById('f-artist').innerText = t.artist;
        audio.src = t.url;
        audio.play().catch(() => {
            alert("Этот трек SoundCloud запретил проигрывать вне их сайта.");
        });
        isPlaying = true; updateIcon(); toggleUI(true);
        tg.HapticFeedback.impactOccurred('medium');
    }

    function toggle() { isPlaying ? audio.pause() : audio.play(); isPlaying = !isPlaying; updateIcon(); }
    function updateIcon() { document.getElementById('p-icon').className = isPlaying ? 'fas fa-pause' : 'fas fa-play'; }
    function toggleUI(s) { document.getElementById('ui').classList.toggle('active', s); }
    function skip(d) { idx = (idx + d + queue.length) % queue.length; play(idx); }

    function seek(e) {
        const p = e.offsetX / e.currentTarget.offsetWidth;
        audio.currentTime = p * audio.duration;
    }

    document.getElementById('scInput').onkeypress = (e) => {
        if(e.key === 'Enter') { search(e.target.value); e.target.blur(); }
    };

    audio.ontimeupdate = () => {
        document.getElementById('prog-fill').style.width = (audio.currentTime / audio.duration * 100) + '%';
    };

    audio.onended = () => skip(1);

    window.onload = () => { tg.expand(); search('OG Buda'); };
</script>
</body>
</html>
